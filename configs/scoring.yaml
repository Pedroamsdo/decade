# Configuração do ranking de fundos.
#
# metrics: lista de métricas que entram no score, com peso e direção.
#   - direction: "positive" => maior é melhor; "negative" => menor é melhor (sinal invertido).
#   - weight: pesos somam 1.0 (validado em runtime).
#   - O nome da chave deve bater com uma coluna produzida em gold/build_fund_metrics.
#     Para adicionar nova métrica: criar attach_<nome> em gold/_metrics.py e listar aqui.
#
# eligibility: filtros aplicados antes do scoring. Fundo só recebe score se passar em TODOS.
#
# selection.top_n: tamanho do top retornado por perfil em build_ranking_report.

metrics:
  information_ratio:
    direction: positive
    weight: 0.7
  sortino_ratio:
    direction: positive
    weight: 0.3

eligibility:
  situacao: "Em Funcionamento Normal"
  nr_cotst_min: 1000
  existing_time_min_days: 252
  equity_min_brl: 50000000

selection:
  top_n: 5
