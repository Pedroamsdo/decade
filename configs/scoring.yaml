# Configuração do ranking de fundos.
#
# metrics: lista de métricas que entram no score, com peso e direção.
#   - direction: "positive" => maior é melhor; "negative" => menor é melhor (sinal invertido).
#   - weight: pesos somam 1.0 (validado em runtime).
#   - O nome da chave deve bater com uma coluna produzida em gold/build_fund_metrics.
#     Para adicionar nova métrica: criar attach_<nome> em gold/_metrics.py e listar aqui.
#
# eligibility: filtros aplicados antes do scoring. Fundo só recebe score se passar em TODOS.
#
# selection.top_n: tamanho do top retornado por perfil em build_ranking_report.

metrics:
  information_ratio:
    direction: positive
    weight: 0.6
  sortino_ratio:
    direction: positive
    weight: 0.25
  tax_efficiency:
    direction: positive
    weight: 0.15

eligibility:
  situacao: "Em Funcionamento Normal"
  nr_cotst_min: 1000
  existing_time_min_days: 252
  equity_min_brl: 50000000

selection:
  top_n: 5

# Imposto de renda efetivo por bucket de `tributacao_alvo` (silver treated).
# `tax_efficiency = 1 - rate` é mapeado em gold.attach_tax_efficiency.
# Buckets em `null` resultam em tax_efficiency = null → score = null
# (não dá pra avaliar a eficiência tributária do fundo).
#
# default_holding_period_years é documentação: o horizonte assumido ao
# colapsar a tabela regressiva em uma alíquota única (3 anos → 15% LP).
# Não modela come-cotas (antecipação semestral em fundos abertos não-isentos
# / não-previdenciários) — ver ADR-013.
tax:
  default_holding_period_years: 3.0
  rates:
    Isento:           0.00      # LCI / LCA / debêntures incentivadas
    Longo Prazo:      0.15      # >720d na regressiva
    Curto Prazo:      0.20      # >180d, ≤720d
    Previdenciário:   0.10      # PGBL/VGBL regressiva ≥10y
    Alíquota de 15%:  0.15      # FIP-like / fechados longo prazo
    Não Aplicável:    null      # exclusivos / FIP / FIDC fechados
    Outros:           null      # catch-all CVM
    Indefinido:       null      # cadastro incompleto
