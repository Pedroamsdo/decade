data_root: data
reports_root: reports

sources:
  cvm_cad_fi_hist:
    url: https://dados.cvm.gov.br/dados/FI/CAD/DADOS/cad_fi_hist.zip
    extension: zip
  cvm_registro_classe:
    url: https://dados.cvm.gov.br/dados/FI/CAD/DADOS/registro_fundo_classe.zip
    extension: zip
  cvm_inf_diario:
    url_template: https://dados.cvm.gov.br/dados/FI/DOC/INF_DIARIO/DADOS/inf_diario_fi_{yyyymm}.zip
    extension: zip
  cvm_inf_diario_hist:
    url_template: https://dados.cvm.gov.br/dados/FI/DOC/INF_DIARIO/DADOS/HIST/inf_diario_fi_{yyyy}.zip
    extension: zip
  bcb_cdi:
    # SGS série 12 = CDI diário em %
    url_template: https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados?formato=json&dataInicial={dt_ini}&dataFinal={dt_fim}
    extension: json
  bcb_selic:
    # SGS série 11 = SELIC diária em %
    url_template: https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados?formato=json&dataInicial={dt_ini}&dataFinal={dt_fim}
    extension: json
  bcb_ipca:
    # SGS série 433 = IPCA mensal em %
    url_template: https://api.bcb.gov.br/dados/serie/bcdata.sgs.433/dados?formato=json&dataInicial={dt_ini}&dataFinal={dt_fim}
    extension: json
  bcb_inpc:
    # SGS série 188 = INPC mensal em %
    url_template: https://api.bcb.gov.br/dados/serie/bcdata.sgs.188/dados?formato=json&dataInicial={dt_ini}&dataFinal={dt_fim}
    extension: json
  bcb_igpm:
    # SGS série 189 = IGP-M mensal em %
    url_template: https://api.bcb.gov.br/dados/serie/bcdata.sgs.189/dados?formato=json&dataInicial={dt_ini}&dataFinal={dt_fim}
    extension: json
http:
  timeout_seconds: 180
  max_retries: 5
  retry_backoff_min_seconds: 2
  retry_backoff_max_seconds: 60
  user_agent: "fund-rank/0.1 (+https://github.com/Pedroamsdo/decade)"

ingest:
  # Janela histórica completa: 10 anos. CVM publica monthly por ~24 meses;
  # anos mais antigos caem no HIST yearly (1 zip por ano), tratado por fallback
  # automático em sources/cvm.py + bronze/ingest_inf_diario.py.
  inf_diario_lookback_months: 360
  # Cobre quota_series (2000-01-03 → as_of). BCB SGS limita ~10y por request
  # → ingest_bcb_indices.py chunka em 3 janelas de até 10 anos.
  index_series_lookback_years: 26
