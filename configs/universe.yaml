# Filtros do universo aplicados antes da segmentação, e regras por segmento.
# Strings refletem os valores reais publicados pela CVM em registro_fundo_classe.zip
# e cad_fi.csv (verificado contra dump de 2026-04-25). Comparação é feita após
# normalização (strip accents + lowercase + collapse whitespace), portanto
# os valores aqui podem usar acentuação e maiúsculas — o silver normaliza ambos os lados.

filters_global:
  situacao_aceita: "Em Funcionamento Normal"
  situacao_rejeitar_passada:
    - "Em Liquidação"
    - "Em Liquidação Judicial"
    - "Cancelado"
    - "Paralisado"
    - "Fase Pré-Operacional"
  situacao_lookback_months: 12

  fundo_exclusivo: false      # exclui Exclusivo=S
  condominio_aceito: ["Aberto"]

  # Captação ativa — proxy: dias com CAPTC_DIA > 0 nos últimos N dias
  captacao_min_dias_positivos: 5
  captacao_window_days: 90

  # Histórico mínimo (dias úteis); tiers: HIGH ≥ 756, MED ≥ 504, LOW ≥ 252
  historico_min_dias_uteis: 252
  historico_high_dias_uteis: 756
  historico_med_dias_uteis: 504

  # Detecção de incorporação/cisão: |z-score do retorno diário| sobre janela rolling
  jump_detection_sigma: 5.0
  jump_detection_window_days: 60

# Padrões de match: prefixos curtos que cobrem variantes da CVM ("Invest.", "Crédito Liv", etc.)
# Critério é prefixo após normalização — o YAML pode usar acento, abreviação ou texto integral.

segments:

  caixa:
    label: "Caixa (D+0/D+1, varejo)"
    classes_anbima_starts:
      - "Renda Fixa Simples"
      - "Renda Fixa Duração Baixa Soberano"
      - "Renda Fixa Duração Baixa Grau de Invest"   # casa "Grau de Invest." e "Grau de Investimento"
    cotizacao_max_dias: 1     # nota: dado não está em CVM Dados Abertos; filtro inativo até integrar 'extrato_fi'
    liquidacao_max_dias: 1
    pl_mediano_minimo_brl: 50_000_000
    cotistas_minimo: 100
    publico_alvo_aceitos:
      - "Público Geral"
    benchmark: CDI

  rfgeral:
    label: "RF Geral (carteira estratégica varejo)"
    classes_anbima_starts:
      - "Renda Fixa Duração Média"
      - "Renda Fixa Duração Alta"
      - "Renda Fixa Duração Livre Soberano"
      - "Renda Fixa Duração Livre Grau de Invest"
      - "Renda Fixa Duração Baixa Crédito"           # baixa+credito → varejo estratégico
      - "Renda Fixa Indexados"                       # IMA-B etc. — duration heterogenea, mas cabem aqui em v1
    cotizacao_max_dias: 30
    liquidacao_max_dias: 30
    pl_mediano_minimo_brl: 50_000_000
    cotistas_minimo: 100
    publico_alvo_aceitos:
      - "Público Geral"
    benchmark: CDI

  qualificado:
    label: "Qualificado / Crédito"
    classes_anbima_starts:
      - "Renda Fixa Duração Livre Crédito"
      - "Renda Fixa Duração Média Crédito"
      - "Renda Fixa Duração Alta Crédito"
      - "Renda Fixa Duração Baixa Crédito"           # poderia ir para varejo se publico=Geral; aqui exige Qualificado
      - "Renda Fixa Dívida Externa"
      - "Renda Fixa Invest. no Exterior"
    publico_alvo_aceitos:
      - "Qualificado"
      - "Profissional"
    pl_mediano_minimo_brl: 30_000_000
    cotistas_minimo: 5
    benchmark: CDI
