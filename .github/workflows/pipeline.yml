name: pipeline

on:
  # Cron mensal: dia 2 às 09:00 UTC (06:00 BRT). Dia 2 evita o herd do dia 1.
  schedule:
    - cron: "0 9 2 * *"

  # Trigger manual com override; default reproduz o case study.
  workflow_dispatch:
    inputs:
      as_of:
        description: "Reference date YYYY-MM-DD (defaults to case-study date)"
        required: false
        default: "2025-12-31"
        type: string

  # Re-roda quando um XLS novo da ANBIMA é commitado.
  push:
    branches: [main]
    paths:
      - "data/bronze/anbima_175/dropped/**"
      - "data/bronze/anbima_indices/dropped/**"

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # apenas para o commit-back no run agendado

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compute AS_OF
        id: as_of
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AS_OF="${{ inputs.as_of }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            AS_OF=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m-%d)
          else
            AS_OF="2025-12-31"
          fi
          echo "AS_OF=${AS_OF}" | tee -a "$GITHUB_OUTPUT"

      # Cache CVM/BCB bronze. ANBIMA fica fora porque já é versionada no git.
      - name: Cache CVM/BCB bronze
        uses: actions/cache@v4
        with:
          path: |
            data/bronze/cvm_cad_fi_hist
            data/bronze/cvm_registro_classe
            data/bronze/cvm_inf_diario
            data/bronze/cvm_inf_diario_hist
            data/bronze/bcb_cdi
            data/bronze/bcb_selic
            data/bronze/bcb_ipca
            data/bronze/bcb_inpc
            data/bronze/bcb_igpm
          key: bronze-${{ runner.os }}-py311-${{ steps.as_of.outputs.AS_OF }}
          restore-keys: |
            bronze-${{ runner.os }}-py311-

      - name: Run pipeline (ingest + build + rank)
        env:
          POLARS_MAX_THREADS: "2"  # runner free tem 2 vCPU
        run: make all AS_OF=${{ steps.as_of.outputs.AS_OF }}

      - name: Show ranking head
        if: always()
        run: |
          if [[ -f ranking.md ]]; then
            echo "----- ranking.md (first 60 lines) -----"
            head -60 ranking.md
          else
            echo "ranking.md not produced"; exit 1
          fi

      - name: Upload ranking + reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranking-${{ steps.as_of.outputs.AS_OF }}-${{ github.run_id }}
          path: |
            ranking.md
            reports/
          retention-days: 90
          if-no-files-found: error

      # Commit-back só no schedule. workflow_dispatch e push pulam.
      - name: Commit results back to main
        if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f ranking.md reports/   # reports/ é gitignored, -f obrigatório
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "ci: refresh ranking.md + reports for AS_OF=${{ steps.as_of.outputs.AS_OF }} [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD:main
